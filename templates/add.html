<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Flask Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>What you got?! Say it!</h1>
    <a class="buttonlink" href="{{ url_for('index') }}">
        <div class="buttonlike">Changed your mind? Click here...</div>
    </a>
    <div class="postform">
        <form class="postform_form" action="/add" method="post">
            <input type="text" name="title" placeholder="What's it about?" required>
            <input type="text" name="author" placeholder="Who's this from?" required>
            <textarea name="content" rows="6" cols="50" placeholder="Tell more, please..."></textarea>
            <button type="submit" value="Submit">shout</button>
        </form>
    </div>
</body>
</html>
