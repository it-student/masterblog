<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Flask Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Welcome to My Flask Blog!</h1>
    <a class="buttonlink" href="{{ url_for('add') }}">
        <div class="buttonlike">Got something? Click here ...</div>
    </a>
    {% for post in posts: %}
    <div class="post">
        <h2>{{ post['title'] }}</h2>
        <p><em>Written by {{ post['author'] }}</em></p>
        <p>{{ post['content'] }}</p>
        <a href="/delete/{{post['id'] }}" class="buttonlink">
            <span class="buttonlike delete">🗑️</span>
        </a>
        <a href="/update/{{ post['id'] }}" class="buttonlink">
            <span class="buttonlike update">✎</span>
        </a>
        <a href="/like/{{ post['id'] }}" class="buttonlink">
            <span class="buttonlike like">👍🏼</span>
            <span>{{ post['likes'] }}</span>
        </a>
    </div>
    {% endfor %}
</body>
</html>
